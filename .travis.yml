language: python

services:
- docker

os:
  - linux

python:
  - "3.5"
  - "3.6"      # current default Python on Travis CI
  - "3.7"
  - "nightly"  # nightly build

matrix:
  include:
    - os: windows
      language: sh
      python: "3.x"
      before_install:
        - choco install python3 --params "/InstallDir:C:\\Python"
        - echo 'python $@' >> /c/Python/python3
        - chmod 777 /c/Python/python3
      env: PATH=/c/Python:/c/Python/Scripts:$PATH

    - os: osx
      language: sh
      python: "3.x"
      before_install:
        - brew update
        - brew upgrade python3

    - os: linux
      name: docker-arch
      before_install:
        - sudo docker run --rm -it archlinux/base /bin/bash -c 'pacman -Sy --noconfirm python3 python-pip && /bin/bash'

install:
  - pip3 install -r requirements.txt

script:
  - python3 ./qmk -h
